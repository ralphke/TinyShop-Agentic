name: Mirror to Azure DevOps

on:
  push:
    branches:
      - '**'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Azure DevOps
        run: |
          git remote remove azdo 2>/dev/null || true
          git remote add azdo "https://:${AZDO_PAT}@dev.azure.com/RaKeTe-AzureDevOps/TinyShop-Agentic/_git/TinyShop-Agentic"
          git push azdo --mirror
        env:
          AZDO_PAT: ${{ secrets.AZDO_PAT }}
