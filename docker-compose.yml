services:
  sqlserver:
    build:
      context: .
      dockerfile: Dockerfile.sqlserver
    container_name: tinyshop-sqlserver
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./src/Products/wwwroot/images:/usr/src/sql/images:ro
      - ./src/Products/SQL:/usr/src/sql/init:ro
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/1433 && echo '' >&3 && exec 3>&- && echo 'success'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  init-db:
    build:
      context: ./src/Products/SQL
      dockerfile: Dockerfile
    container_name: tinyshop-sql-init
    depends_on:
      sqlserver:
        condition: service_healthy
      embeddings:
        condition: service_started
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      EMBEDDINGS_URL: http://embeddings:80/embed
    volumes:
      - ./src/Products/SQL:/usr/src/sql/init:ro
    entrypoint: /bin/bash
    command: ["/usr/src/sql/init/init-db.sh"]
    restart: "no"

  products:
    build:
      context: .
      dockerfile: src/Products/Dockerfile
    container_name: tinyshop-products
    depends_on:
      init-db:
        condition: service_completed_successfully
      embeddings:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      EnableHttpsRedirection: "false"
      ConnectionStrings__ProductsDb: ${PRODUCTS_DB_CONNECTION_STRING}
      EMBEDDING_SERVICE__ENDPOINT: http://embeddings/embed
    ports:
      - "5228:8080"
    restart: on-failure

  store:
    build:
      context: .
      dockerfile: src/Store/Dockerfile
    container_name: tinyshop-store
    depends_on:
      - products
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      EnableHttpsRedirection: "false"
      ProductEndpoint: http://products:8080
      ProductBrowserEndpoint: http://localhost:5228
      Logging__LogLevel__Microsoft.AspNetCore.DataProtection.KeyManagement.XmlKeyManager: Error
    ports:
      - "5158:8080"
    volumes:
      - store-dataprotection-keys:/root/.aspnet/DataProtection-Keys
    restart: on-failure

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    ports:
      - "8001:80"
    command: --model-id sentence-transformers/all-mpnet-base-v2
    volumes:
      - model-cache:/data
    environment:
      HF_HOME: /data

volumes:
  model-cache:
  sqlserver-data:
  store-dataprotection-keys:
